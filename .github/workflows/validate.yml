name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  root:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24
          package-manager-cache: false

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare pnpm@11.7.0 --activate

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm test

  webapp:
    runs-on: ubuntu-latest
    env:
      BASE_PATH: /app-starter
      E2E_BASE_PATH: /app-starter
      # Must match the port in AUTH_BASE_URL: playwright.config.ts otherwise
      # serves on its own default while auth expects this one.
      E2E_PORT: "3290"
      AUTH_BASE_URL: http://localhost:3290/app-starter
      BETTERAUTH_SECRET: ci-betterauth-secret-for-playwright-tests-only
      DATABASE_URL: postgresql://starter:starter_e2e_password@localhost:45432/business_app_starter_e2e_test
      MIGRATION_DATABASE_URL: postgresql://starter:starter_e2e_password@localhost:45432/business_app_starter_e2e_test
      WORKER_DATABASE_URL: postgresql://starter:starter_e2e_password@localhost:45432/business_app_starter_e2e_test
      # The worker suite gets its own database on the same container so a pytest
      # run and a Playwright run cannot truncate each other's rows.
      WORKER_TEST_DATABASE_URL: postgresql://starter:starter_e2e_password@localhost:45432/business_app_starter_worker_test
      E2E_POSTGRES_CONTAINER: click-tt-e2e-postgres

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24
          package-manager-cache: false

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare pnpm@11.7.0 --activate

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.x"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@847eaa4afeb791b06daa46e8eafa8b1b68d7cfb4 # v2.0.1

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Install webapp dependencies
        working-directory: webapp
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: webapp
        run: pnpm run prisma:generate

      - name: Install Semgrep
        run: python -m pip install semgrep

      - name: Typecheck
        working-directory: webapp
        run: pnpm run typecheck

      - name: Lint
        working-directory: webapp
        run: pnpm run lint

      - name: Architecture
        working-directory: webapp
        run: pnpm run architecture

      - name: Python quality
        working-directory: webapp
        run: pnpm run quality:python

      - name: CLI quality
        working-directory: webapp
        run: pnpm run quality:cli

      - name: Semgrep
        working-directory: webapp
        run: pnpm run semgrep

      - name: Runtime credential validation
        working-directory: webapp
        run: pnpm run validate:runtime-credentials

      - name: Test
        working-directory: webapp
        run: pnpm test

      - name: Provision PostgreSQL
        working-directory: webapp
        run: node scripts/ensure-e2e-db.mjs

      - name: Worker tests
        working-directory: webapp/worker
        run: uv run pytest -q

      - name: Install Playwright browsers
        working-directory: webapp
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E
        working-directory: webapp
        run: pnpm run test:e2e

      - name: Upload E2E traces
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-traces
          # trace: "retain-on-failure" in playwright.config.ts writes traces here.
          path: webapp/test-results
          if-no-files-found: ignore
          retention-days: 7
